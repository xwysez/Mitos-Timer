<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Mitos Pensionne</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-wrap">
        <div class="login-box">

            <div class="login-header">
                <div class="login-logo">MP</div>
                <h1>Mitos Pensionne</h1>
                <p class="login-sub">room management system</p>
            </div>

            <div class="error-message" id="errorMessage">
                Invalid username or password
            </div>

            <form class="login-form" id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="login-btn">Log In <span class="btn-arrow">→</span></button>
            </form>

        </div>
    </div>

    <script type="module">
        import { initializeApp }                   from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword,
                 onAuthStateChanged }              from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyCQVbMpW5CRZJHLBZmN5yH4uygR7mUSwb4",
            authDomain:        "mitos-pensionne.firebaseapp.com",
            projectId:         "mitos-pensionne",
            storageBucket:     "mitos-pensionne.firebasestorage.app",
            messagingSenderId: "63535680420",
            appId:             "1:63535680420:web:2ab864afc876492f410f31"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // If already signed in, skip login screen
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = 'index.html';
        });

        // Expose Firebase sign-in for login.js to call
        window.firebaseSignIn = (email, password) =>
            signInWithEmailAndPassword(auth, email, password);

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s   = document.createElement('script');
                s.src     = src;
                s.onload  = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
            });
        }

        await loadScript('login.js');
    </script>

</body>
</html>
