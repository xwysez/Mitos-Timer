<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revenue — Mitos Pensionne</title>
    <link rel="stylesheet" href="revenue.css">
</head>
<body>
    <div class="container">

        <header>
            <div class="header-left">
                <a href="index.html" class="back-btn">&#8592; Back</a>
                <div class="header-title">
                    <h1>Revenue</h1>
                    <p class="tagline">session log</p>
                </div>
            </div>
            <div class="summary-strip">
                <div class="summary-item">
                    <span class="summary-label">Sessions</span>
                    <span class="summary-value" id="statSessions">0</span>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-item">
                    <span class="summary-label">Total Revenue</span>
                    <span class="summary-value accent" id="statRevenue">&#8369;0.00</span>
                </div>
                <div class="summary-divider"></div>
                <div class="summary-item">
                    <span class="summary-label">Orders Total</span>
                    <span class="summary-value amber" id="statOrders">&#8369;0.00</span>
                </div>
            </div>
        </header>

        <div id="revenueList" class="rev-list"></div>

    </div>

    <!-- Helpers and renderPage() defined first so the module can call them -->
    <script>
        function fmtTime(ts) {
            if (!ts) return '—';
            return new Date(ts).toLocaleTimeString('en-PH', {
                hour: '2-digit', minute: '2-digit', hour12: true
            });
        }
        function fmtDate(ts) {
            if (!ts) return '—';
            return new Date(ts).toLocaleDateString('en-PH', {
                month: 'short', day: 'numeric', year: 'numeric'
            });
        }
        function durLabel(h) {
            return h ? `${h} hr${h !== 1 ? 's' : ''}` : '—';
        }

        function renderPage() {
            const entries = RevenueDB.getAll();

            document.getElementById('statSessions').textContent = entries.length;
            document.getElementById('statRevenue').textContent  =
                '\u20B1' + entries.reduce((s, e) => s + e.totalBill,   0).toFixed(2);
            document.getElementById('statOrders').textContent   =
                '\u20B1' + entries.reduce((s, e) => s + e.ordersTotal, 0).toFixed(2);

            const listEl = document.getElementById('revenueList');

            if (!entries.length) {
                listEl.innerHTML = `
                    <div class="rev-empty">
                        <span class="rev-empty-icon">&#128203;</span>
                        <p>No sessions recorded yet.</p>
                        <p>Completed room sessions will appear here.</p>
                    </div>`;
                return;
            }

            listEl.innerHTML = entries.map(e => {
                const hasOrders  = e.orders && e.orders.length > 0;
                const ordersHTML = hasOrders
                    ? e.orders.map(o => `
                        <div class="rev-order-row">
                            <span class="rev-order-name">${o.name}</span>
                            <span class="rev-order-price">\u20B1${(o.price || 0).toFixed(2)}</span>
                        </div>`).join('')
                    : '<div class="rev-order-none">No orders</div>';

                return `
                <div class="rev-card">
                    <div class="rev-card-header">
                        <div class="rev-card-title">
                            <span class="rev-room-name">${e.roomName}</span>
                            <span class="rev-dur-badge">${durLabel(e.duration)}</span>
                        </div>
                        <div class="rev-card-bill">\u20B1${e.totalBill.toFixed(2)}</div>
                    </div>
                    <div class="rev-meta">
                        <div class="rev-meta-item">
                            <span class="rev-meta-label">Date</span>
                            <span class="rev-meta-val">${fmtDate(e.timeIn)}</span>
                        </div>
                        <div class="rev-meta-item">
                            <span class="rev-meta-label">Time In</span>
                            <span class="rev-meta-val">${fmtTime(e.timeIn)}</span>
                        </div>
                        <div class="rev-meta-item">
                            <span class="rev-meta-label">Time Out</span>
                            <span class="rev-meta-val">${fmtTime(e.timeOut)}</span>
                        </div>
                        <div class="rev-meta-item">
                            <span class="rev-meta-label">Room Cost</span>
                            <span class="rev-meta-val accent">\u20B1${e.roomCost.toFixed(2)}</span>
                        </div>
                    </div>
                    <div class="rev-orders-wrap">
                        <div class="rev-orders-label">Orders</div>
                        <div class="rev-orders-list">${ordersHTML}</div>
                        ${hasOrders ? `
                        <div class="rev-orders-sub">
                            <span>Orders subtotal</span>
                            <span>\u20B1${e.ordersTotal.toFixed(2)}</span>
                        </div>` : ''}
                    </div>
                    <div class="rev-card-footer">
                        <span class="rev-footer-label">Total Bill</span>
                        <span class="rev-footer-val">\u20B1${e.totalBill.toFixed(2)}</span>
                    </div>
                </div>`;
            }).join('');
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyCQVbMpW5CRZJHLBZmN5yH4uygR7mUSwb4",
            authDomain:        "mitos-pensionne.firebaseapp.com",
            projectId:         "mitos-pensionne",
            storageBucket:     "mitos-pensionne.firebasestorage.app",
            messagingSenderId: "63535680420",
            appId:             "1:63535680420:web:2ab864afc876492f410f31"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        window.db = db;
        window.fb = { doc, setDoc, getDoc };

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s   = document.createElement('script');
                s.src     = src;
                s.onload  = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
            });
        }

        await loadScript('revenue.js');
        await RevenueDB.load();
        renderPage();
    </script>

</body>
</html>
