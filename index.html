<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitos Pensionne — Room Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Mitos Pensionne</h1>
                <p class="tagline">room management system</p>
            </div>
            <div class="header-actions">
                <a href="revenue.html" class="revenue-btn">
                    Revenue
                    <span class="revenue-badge" id="revenueBadge"></span>
                </a>
                <button class="reset-btn" onclick="resetAllRooms()">Reset All</button>
                <button class="logout-btn" onclick="logout()">Log Out</button>
            </div>
        </header>
        <div class="rooms-grid" id="roomsGrid"></div>
    </div>

    <!-- Order Notes Modal -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Orders — <span id="modalRoomName"></span></h3>
                <span class="close-modal" onclick="closeNoteModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="note-input-section">
                    <input type="text" id="noteItemInput" placeholder="Item name">
                    <input type="number" id="notePriceInput" placeholder="₱ Price" step="0.01">
                    <button class="add-note-btn" onclick="addNoteItem()">Add</button>
                </div>
                <div class="notes-list" id="notesList"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp }                                        from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc }                   from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut }                from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyCQVbMpW5CRZJHLBZmN5yH4uygR7mUSwb4",
            authDomain:        "mitos-pensionne.firebaseapp.com",
            projectId:         "mitos-pensionne",
            storageBucket:     "mitos-pensionne.firebasestorage.app",
            messagingSenderId: "63535680420",
            appId:             "1:63535680420:web:2ab864afc876492f410f31"
        };

        const app  = initializeApp(firebaseConfig);
        const db   = getFirestore(app);
        const auth = getAuth(app);

        // ── Auth guard: redirect to login if not signed in ────────────────────
        await new Promise((resolve) => {
            const unsub = onAuthStateChanged(auth, (user) => {
                unsub();
                if (!user) {
                    window.location.href = 'login.html';
                } else {
                    resolve();
                }
            });
        });

        window.db = db;
        window.fb = { doc, setDoc, getDoc };

        // Expose sign-out so script.js logout() can call it
        window.mitoSignOut = () => signOut(auth);

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s   = document.createElement('script');
                s.src     = src;
                s.onload  = resolve;
                s.onerror = () => reject(new Error('Failed to load: ' + src));
                document.body.appendChild(s);
            });
        }

        try {
            await loadScript('revenue.js');
            await loadScript('script.js');
        } catch (err) {
            console.error('Script load error:', err);
        }
    </script>

</body>
</html>
