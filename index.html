<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitos Pensionne — Room Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Mitos Pensionne</h1>
                <p class="tagline">room management system</p>
            </div>
            <div class="header-actions">
                <a href="revenue.html" class="revenue-btn">
                    Revenue
                    <span class="revenue-badge" id="revenueBadge"></span>
                </a>
                <button class="reset-btn" onclick="resetAllRooms()">Reset All</button>
                <button class="logout-btn" onclick="logout()">Log Out</button>
            </div>
        </header>

        <div class="rooms-grid" id="roomsGrid"></div>
    </div>

    <!-- Order Notes Modal -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Orders — <span id="modalRoomName"></span></h3>
                <span class="close-modal" onclick="closeNoteModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="note-input-section">
                    <input type="text" id="noteItemInput" placeholder="Item name">
                    <input type="number" id="notePriceInput" placeholder="₱ Price" step="0.01">
                    <button class="add-note-btn" onclick="addNoteItem()">Add</button>
                </div>
                <div class="notes-list" id="notesList"></div>
            </div>
        </div>
    </div>

    <!-- ✅ FIREBASE (ADD THIS) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.db = db;
        window.fb = { doc, setDoc, getDoc };
    </script>

    <!-- YOUR EXISTING FILES -->
    <script src="revenue.js"></script>
    <script src="./login.js"></script>

    <!-- ✅ ADD YOUR MAIN SCRIPT -->
    <script src="./script.js"></script>

</body>
</html>
