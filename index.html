<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitos Pensionne — Room Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Mitos Pensionne</h1>
                <p class="tagline">room management system</p>
            </div>
            <div class="header-actions">
                <a href="revenue.html" class="revenue-btn">
                    Revenue
                    <span class="revenue-badge" id="revenueBadge"></span>
                </a>
                <button class="reset-btn" onclick="resetAllRooms()">Reset All</button>
                <button class="logout-btn" onclick="logout()">Log Out</button>
            </div>
        </header>

        <div class="rooms-grid" id="roomsGrid"></div>
    </div>

    <!-- Order Notes Modal -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Orders — <span id="modalRoomName"></span></h3>
                <span class="close-modal" onclick="closeNoteModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="note-input-section">
                    <input type="text" id="noteItemInput" placeholder="Item name">
                    <input type="number" id="notePriceInput" placeholder="₱ Price" step="0.01">
                    <button class="add-note-btn" onclick="addNoteItem()">Add</button>
                </div>
                <div class="notes-list" id="notesList"></div>
            </div>
        </div>
    </div>

    <!-- ================================================================
         STEP 1: Firebase SDK (compat build — works with normal <script>)
         ================================================================ -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <!-- ================================================================
         STEP 2: Init Firebase and expose db + fb helpers on window
         ================================================================ -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQVbMpW5CRZJHLBZmN5yH4uygR7mUSwb4",
            authDomain: "mitos-pensionne.firebaseapp.com",
            projectId: "mitos-pensionne",
            storageBucket: "mitos-pensionne.firebasestorage.app",
            messagingSenderId: "63535680420",
            appId: "1:63535680420:web:2ab864afc876492f410f31"
        };

        firebase.initializeApp(firebaseConfig);
        const _db = firebase.firestore();

        // Expose the helpers that revenue.js and script.js expect
        window.db = _db;
        window.fb = {
            doc:    (db, col, docId) => db.collection(col).doc(docId),
            setDoc: (ref, data)      => ref.set(data),
            getDoc: (ref)            => ref.get().then(snap => ({
                exists: () => snap.exists,
                data:   () => snap.data()
            }))
        };
    </script>

    <!-- ================================================================
         STEP 3: App scripts (order matters)
         ================================================================ -->
    <script src="revenue.js"></script>
    <script src="login.js"></script>
    <script src="script.js"></script>

</body>
</html>
