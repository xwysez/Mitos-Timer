<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitos Pensionne — Room Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Mitos Pensionne</h1>
                <p class="tagline">room management system</p>
            </div>
            <div class="header-actions">
                <a href="revenue.html" class="revenue-btn">
                    Revenue
                    <span class="revenue-badge" id="revenueBadge"></span>
                </a>
                <button class="reset-btn" onclick="resetAllRooms()">Reset All</button>
                <button class="logout-btn" onclick="logout()">Log Out</button>
            </div>
        </header>
        <div class="rooms-grid" id="roomsGrid"></div>
    </div>

    <!-- Order Notes Modal -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Orders — <span id="modalRoomName"></span></h3>
                <span class="close-modal" onclick="closeNoteModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="note-input-section">
                    <input type="text" id="noteItemInput" placeholder="Item name">
                    <input type="number" id="notePriceInput" placeholder="₱ Price" step="0.01">
                    <button class="add-note-btn" onclick="addNoteItem()">Add</button>
                </div>
                <div class="notes-list" id="notesList"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp }                        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc }    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // ── YOUR FIREBASE CONFIG ──────────────────────────────────────────────
        // Replace every value below with your real Firebase project config.
        // Firebase Console → Project Settings → Your Apps → SDK setup
        const firebaseConfig = {
            apiKey:            "PASTE_YOUR_apiKey_HERE",
            authDomain:        "PASTE_YOUR_authDomain_HERE",
            projectId:         "PASTE_YOUR_projectId_HERE",
            storageBucket:     "PASTE_YOUR_storageBucket_HERE",
            messagingSenderId: "PASTE_YOUR_messagingSenderId_HERE",
            appId:             "PASTE_YOUR_appId_HERE"
        };

        // ── INIT FIREBASE ─────────────────────────────────────────────────────
        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        // ── EXPOSE TO PLAIN SCRIPTS ───────────────────────────────────────────
        window.db = db;
        window.fb = { doc, setDoc, getDoc };

        // ── LOAD PLAIN SCRIPTS ONLY AFTER FIREBASE IS READY ──────────────────
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s   = document.createElement('script');
                s.src     = src;
                s.onload  = resolve;
                s.onerror = () => reject(new Error('Failed to load: ' + src));
                document.body.appendChild(s);
            });
        }

        try {
            await loadScript('login.js');
            await loadScript('revenue.js');
            await loadScript('script.js');
        } catch (err) {
            console.error('Script load error:', err);
        }
    </script>

</body>
</html>
